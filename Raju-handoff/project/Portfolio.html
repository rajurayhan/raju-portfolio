<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Raju Rayhan — Portfolio</title>
<link rel="stylesheet" href="styles.css" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  html, body { margin: 0; padding: 0; background: #0d0a07; }
  body { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  #app { width: 100vw; height: 100vh; }
  /* inside the artboard, the .page should flow naturally — not clip */
  .dc-card .page { height: auto !important; overflow: visible !important; min-height: 100%; }
  .dc-card .topbar { position: relative !important; }
</style>
</head>
<body>
<div id="app"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="home.jsx"></script>
<script type="text/babel" src="work.jsx"></script>
<script type="text/babel" src="sulus.jsx"></script>
<script type="text/babel" src="edp.jsx"></script>
<script type="text/babel" src="hive.jsx"></script>
<script type="text/babel" src="aalap.jsx"></script>
<script type="text/babel" src="learnwithai.jsx"></script>
<script type="text/babel" src="dss.jsx"></script>
<script type="text/babel" src="about.jsx"></script>
<script type="text/babel" src="contact.jsx"></script>

<script type="text/babel" data-presets="react">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "dark",
  "accent": "#c96442",
  "density": "regular",
  "mono": "'JetBrains Mono', monospace",
  "focus": "work"
}/*EDITMODE-END*/;

function Page({ tweaks, initial }) {
  const [page, setPage] = React.useState(initial || 'home');
  React.useEffect(() => { setPage(initial || 'home'); }, [initial]);

  const nav = (id) => { setPage(id); };

  const cls = [
    'page',
    tweaks.theme === 'dark' ? 'theme-dark' : '',
    'density-' + tweaks.density,
  ].join(' ');

  const style = { '--accent': tweaks.accent, '--mono': tweaks.mono };

  let content;
  if (page === 'home') content = <HomePage onNav={nav} />;
  else if (page === 'work') content = <WorkPage onNav={nav} />;
  else if (page === 'sulus') content = <SulusPage onNav={nav} />;
  else if (page === 'edp') content = <EdpPage onNav={nav} />;
  else if (page === 'hive') content = <HivePage onNav={nav} />;
  else if (page === 'aalap') content = <AalapPage onNav={nav} />;
  else if (page === 'learnwithai') content = <LearnWithAIPage onNav={nav} />;
  else if (page === 'dss') content = <DssPage onNav={nav} />;
  else if (page === 'about') content = <AboutPage onNav={nav} />;
  else if (page === 'contact') content = <ContactPage onNav={nav} />;

  return <div className={cls} style={style}>{content}</div>;
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  // Heights sized to fit each page's full content. Measured generously.
  const H = {
    home: 3200, work: 3400, sulus: 3800, edp: 3600, hive: 3600,
    aalap: 3200, learnwithai: 3200, dss: 3600, about: 3800, contact: 2800,
  };

  return (
    <React.Fragment>
      <DesignCanvas>
        <DCSection id="overview" title="Raju Rayhan — Portfolio"
          subtitle="Full site prototype · 10 pages · click ⤢ on any artboard for fullscreen">
          <DCArtboard id="home" label="01 · Home" width={1280} height={H.home}>
            <Page tweaks={t} initial="home" />
          </DCArtboard>
          <DCArtboard id="work" label="02 · Work / Casebook" width={1280} height={H.work}>
            <Page tweaks={t} initial="work" />
          </DCArtboard>
          <DCArtboard id="sulus" label="03 · Case — Sulus.ai" width={1280} height={H.sulus}>
            <Page tweaks={t} initial="sulus" />
          </DCArtboard>
          <DCArtboard id="edp" label="04 · Case — eDP" width={1280} height={H.edp}>
            <Page tweaks={t} initial="edp" />
          </DCArtboard>
          <DCArtboard id="hive" label="05 · Case — The Hive" width={1280} height={H.hive}>
            <Page tweaks={t} initial="hive" />
          </DCArtboard>
          <DCArtboard id="aalap" label="06 · Case — AalapAI" width={1280} height={H.aalap}>
            <Page tweaks={t} initial="aalap" />
          </DCArtboard>
          <DCArtboard id="learnwithai" label="07 · Case — LearnWithAI.BD" width={1280} height={H.learnwithai}>
            <Page tweaks={t} initial="learnwithai" />
          </DCArtboard>
          <DCArtboard id="dss" label="08 · Case — DSS HRMS" width={1280} height={H.dss}>
            <Page tweaks={t} initial="dss" />
          </DCArtboard>
          <DCArtboard id="about" label="09 · About" width={1280} height={H.about}>
            <Page tweaks={t} initial="about" />
          </DCArtboard>
          <DCArtboard id="contact" label="10 · Contact" width={1280} height={H.contact}>
            <Page tweaks={t} initial="contact" />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel>
        <TweakSection label="Theme" />
        <TweakRadio label="Mode" value={t.theme}
          options={[{ value: 'light', label: 'Day' }, { value: 'dark', label: 'Night' }]}
          onChange={(v) => setTweak('theme', v)} />
        <TweakColor label="Accent" value={t.accent}
          onChange={(v) => setTweak('accent', v)} />

        <TweakSection label="Type" />
        <TweakSelect label="Monospace" value={t.mono}
          options={[
            { value: "'JetBrains Mono', monospace", label: 'JetBrains Mono' },
            { value: "'IBM Plex Mono', monospace", label: 'IBM Plex Mono' },
            { value: "'Fira Code', monospace", label: 'Fira Code' },
            { value: "ui-monospace, SFMono-Regular, Menlo, monospace", label: 'System mono' },
          ]}
          onChange={(v) => setTweak('mono', v)} />

        <TweakSection label="Layout" />
        <TweakRadio label="Density" value={t.density}
          options={['compact', 'regular', 'roomy']}
          onChange={(v) => setTweak('density', v)} />

        <div style={{ fontSize: 10.5, color: 'rgba(41,38,27,.55)', paddingTop: 4, lineHeight: 1.5 }}>
          Click the ⤢ on any artboard to open fullscreen.<br/>
          Inside any page, click the nav links to move around.
        </div>
      </TweaksPanel>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>

</body>
</html>
